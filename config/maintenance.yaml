# Logging system maintenance configuration

# Archive Configuration
archival:
  enabled: true
  archive_dir: logs/archive
  strategies:
    age_based:
      enabled: true
      max_age_days: 30
    size_based:
      enabled: true
      max_size_mb: 1000  # 1GB total log size

# Analysis Configuration
analysis:
  enabled: true
  schedule:
    frequency: hourly  # hourly, daily, weekly
    time: "00:00"  # For daily/weekly analysis
  retention:
    analyzed_data_days: 90
  features:
    error_analysis: true
    performance_metrics: true
    usage_patterns: true
    security_audit: true

# Dashboard Integration
dashboard:
  enabled: true
  type: grafana  # grafana, kibana, custom
  url: http://localhost:3000
  update_interval: 300  # 5 minutes
  credentials:
    api_key: ${GRAFANA_API_KEY}
  dashboards:
    - name: "Log Overview"
      id: "log-overview"
      panels:
        - error_rates
        - response_times
        - disk_usage
        - log_volume
    - name: "Security Dashboard"
      id: "security-logs"
      panels:
        - authentication_failures
        - permission_violations
        - suspicious_patterns
    - name: "Performance Dashboard"
      id: "performance-logs"
      panels:
        - endpoint_latency
        - resource_usage
        - bottlenecks

# Alert Configuration
alerts:
  enabled: true
  thresholds:
    error_rate: 0.1  # 10%
    disk_usage: 0.9  # 90%
    response_time: 5000  # 5 seconds
    log_size: 1073741824  # 1GB
    archive_age: 90  # days
  
  notification:
    email:
      enabled: true
      smtp_server: ${SMTP_SERVER}
      from: ${ALERT_EMAIL_FROM}
      to: ${ALERT_EMAIL_TO}
      use_tls: true
      username: ${SMTP_USERNAME}
      password: ${SMTP_PASSWORD}
    
    slack:
      enabled: true
      webhook_url: ${SLACK_WEBHOOK_URL}
      channel: "#logging-alerts"
    
    teams:
      enabled: true
      webhook_url: ${TEAMS_WEBHOOK_URL}
  
  notification_rules:
    throttle_interval: 3600  # 1 hour
    quiet_hours:
      enabled: true
      start: "22:00"
      end: "06:00"
    escalation:
      enabled: true
      levels:
        - threshold: 0.15  # 15% error rate
          notify: ["email", "slack"]
        - threshold: 0.25  # 25% error rate
          notify: ["email", "slack", "teams"]

# Maintenance Schedule
maintenance:
  log_rotation:
    check_interval: 3600  # 1 hour
    max_file_size: 104857600  # 100MB
    compression: true
    compression_algorithm: gzip
  
  health_check:
    enabled: true
    interval: 300  # 5 minutes
    checks:
      - disk_space
      - write_permissions
      - rotation_status
      - archive_integrity
  
  cleanup:
    enabled: true
    schedule: "0 0 * * *"  # Daily at midnight
    strategies:
      - old_logs
      - empty_files
      - corrupt_archives